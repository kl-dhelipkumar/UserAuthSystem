<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <style>
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        color: rgb(27, 38, 141);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 1.2rem;
        font-weight: bold;
        border: 2px solid rgb(101, 112, 231);
        border-radius: 10px;
        margin: 10% 25%;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        background-color: #f2e3ab;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        background-color: #f2e3ab;
      }

      th,
      td {
        padding: 8px;
      }

      input {
        width: 100%;
        padding: 5px;
        border: 1px solid rgb(101, 112, 231);
        border-radius: 4px;
        font-size: 1rem;
        box-sizing: border-box;
      }

      input:invalid {
        border-color: red;
      }

      input:valid {
        border-color: green;
      }

      .submit-btn {
        padding: 5px 10px;
        border-radius: 5px;
        border: none;
        background-color: rgb(27, 38, 141);
        color: white;
        cursor: pointer;
        font-size: 1rem;
      }

      .submit-btn:hover {
        background-color: rgb(50, 65, 180);
      }

      a {
        color: rgb(27, 38, 141);
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        .container {
          margin: 10% 5%;
          padding: 10px;
          border-radius: 5px;
          font-size: 0.85rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form action="register" method="post">
        <table>
          <tr>
            <td><label for="name">Name</label></td>
            <td>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Full Name"
                required
                minlength="3"
                maxlength="50"
              />
            </td>
          </tr>
          <tr>
            <td><label for="age">Age</label></td>
            <td>
              <input
                type="number"
                id="age"
                name="age"
                placeholder="Age"
                required
                min="1"
                max="120"
              />
            </td>
          </tr>
          <tr>
            <td><label for="mobile">Mobile Number</label></td>
            <td>
              <input
                type="tel"
                id="mobile"
                name="mobile"
                placeholder="Mobile Number"
                required
                pattern="\d{10}"
                title="Enter a valid 10-digit mobile number"
              />
            </td>
          </tr>
          <tr>
            <td><label for="email">Email</label></td>
            <td>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Email"
                required
              />
            </td>
          </tr>
          <tr>
            <td><label for="password">Password</label></td>
            <td>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Password"
                required
                minlength="8"
                title="Password must be at least 8 characters"
              />
            </td>
          </tr>
          <tr>
            <td colspan="2" align="center">
              <button type="submit" class="submit-btn">Register</button>
            </td>
          </tr>
          <tr>
            <td colspan="2" align="center">
              <a href="login.html">Already have an account? Login</a>
            </td>
          </tr>
        </table>
      </form>
    </div>
  </body>
</html>
