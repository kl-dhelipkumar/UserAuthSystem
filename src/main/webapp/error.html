<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Error</title>
  <style>
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      border: 2px solid rgb(101, 112, 231);
      border-radius: 10px;
      margin: 10% 25%;
      padding: 30px 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      background-color: #f2e3ab;
      text-align: center;
    }

    .error-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h2 {
      color: rgb(180, 30, 30);
      font-size: 1.4rem;
      margin: 0 0 10px;
    }

    p {
      color: rgb(60, 60, 60);
      font-size: 1rem;
      margin: 0 0 20px;
    }

    a {
      display: inline-block;
      padding: 8px 20px;
      background-color: rgb(27, 38, 141);
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 0.95rem;
    }

    a:hover {
      background-color: rgb(50, 65, 180);
    }

    @media (max-width: 768px) {
      .container {
        margin: 10% 5%;
        padding: 20px 10px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-icon">⚠️</div>
    <h2>Something went wrong</h2>
    <p>Please check your details and try again.</p>
    <a href="login.html">Back to Login</a>
  </div>
</body>
</html>
