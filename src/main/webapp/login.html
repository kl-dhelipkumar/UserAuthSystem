<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1.2rem;
      font-weight: bold;
      color: rgb(27, 38, 141);
      border: 2px solid rgb(101, 112, 231);
      border-radius: 10px;
      margin: 10% 25%;
      padding: 30px 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      background-color: #f2e3ab;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 1.4rem;
      color: rgb(27, 38, 141);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      width: 100%;
      margin-bottom: 15px;
    }

    label {
      margin-bottom: 5px;
      font-size: 1rem;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid rgb(101, 112, 231);
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    input:invalid {
      border-color: red;
    }

    input:valid {
      border-color: green;
    }

    .submit-btn {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: none;
      background-color: rgb(27, 38, 141);
      color: white;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 5px;
    }

    .submit-btn:hover {
      background-color: rgb(50, 65, 180);
    }

    a {
      color: rgb(27, 38, 141);
      font-size: 0.9rem;
      margin-top: 15px;
    }

    form {
      width: 100%;
    }

    @media (max-width: 768px) {
      .container {
        margin: 10% 5%;
        padding: 20px 10px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <form action="login" method="post">

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          required
          minlength="8"
          title="Password must be at least 8 characters"
        />
      </div>

      <button type="submit" class="submit-btn">Login</button>

      <div style="text-align: center;">
        <a href="register.html">Don't have an account? Register</a>
      </div>

    </form>
  </div>
</body>
</html>
